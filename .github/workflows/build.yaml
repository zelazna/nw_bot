name: Build NW Bot on Tag

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write
      discussions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Generate UI file
        run: uv run pyside6-uic bot/ui/main_window.ui -o bot/ui/main_window_ui.py

      - name: Build GUI executable
        run: uv run pyinstaller nwbot.spec

      - name: Download NSIS
        run: choco install nsis --yes

      - name: Build installer
        run: makensis installer.nsi

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: NWBotInstaller.exe
          generate_release_notes: true
